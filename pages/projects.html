<section id="projects" class="page-section proj-page">
  <div id="gp-bg" class="gp-bg" aria-hidden="true"></div>
  <div class="gp-overlay-left" aria-hidden="true"></div>
  <div class="gp-overlay-bottom" aria-hidden="true"></div>

  <div class="gp-watermark" aria-hidden="true">
    <span class="gp-watermark-label">Project Showcase</span>
    <span id="gp-watermark-name" class="gp-watermark-name"></span>
  </div>

  <div id="gp-character" class="gp-character" hidden>
    <img id="gp-character-img" class="gp-character-img" src="" alt="">
  </div>

  <aside class="gp-sidebar" aria-label="Filter projects by category">
    <div id="gp-category-nav" class="gp-category-nav" role="list"></div>
  </aside>

  <div class="gp-content">
    <p id="gp-featured" class="featured-badge" hidden>Featured</p>
    <h1 id="gp-name" class="gp-proj-name"></h1>
    <p id="gp-subtitle" class="gp-subtitle"></p>
    <div class="gp-name-rule" aria-hidden="true"></div>

    <div class="gp-card">
      <p id="gp-role" class="gp-card-eyebrow"></p>
      <p id="gp-summary" class="gp-card-summary"></p>
      <p id="gp-desc" class="gp-card-desc"></p>
      <div id="gp-tags" class="project-tags"></div>
      <div id="gp-meta" class="project-meta"></div>
      <ul id="gp-highlights" class="project-highlights"></ul>
      <div id="gp-links" class="project-links"></div>
      <div id="gp-actions" class="gp-media-actions"></div>
    </div>
  </div>

  <div class="gp-strip-wrap">
    <button class="gp-strip-btn gp-strip-prev" type="button" aria-label="Previous project">&#10094;</button>
    <div id="gp-strip" class="gp-strip" role="list" aria-label="All projects"></div>
    <button class="gp-strip-btn gp-strip-next" type="button" aria-label="Next project">&#10095;</button>
  </div>

  <div id="gp-modal" class="gp-media-modal" hidden role="dialog" aria-modal="true" aria-label="Project media">
    <button class="gp-modal-close" type="button" aria-label="Close media">&#10005;</button>
    <div id="gp-modal-inner" class="gp-modal-inner"></div>
  </div>
</section>
