# ──────────────────────────────────────────────────────────────────────────────
# Decap CMS Configuration — Quentin F. Davis Portfolio
# ──────────────────────────────────────────────────────────────────────────────
#
# BEFORE THIS WORKS you need to:
#   1. Register a GitHub OAuth App (see admin/index.html for full steps)
#   2. Replace YOUR_GITHUB_USERNAME  with your actual GitHub username
#   3. Replace YOUR_REPO_NAME        with your repo name (e.g. portfolio)
#   4. Replace YOUR_OAUTH_CLIENT_ID  with the Client ID from step 1
#
# WHY NO SECRET KEY IS NEEDED:
#   The `auth_type: pkce` setting uses GitHub's PKCE OAuth flow.
#   PKCE is designed for public clients (no server). Your Client ID is safe
#   to commit — it only works when the request comes from your registered
#   callback URL, so nobody else can impersonate your app.
#
# WHAT THIS FILE CONTROLS:
#   - Which GitHub repo and branch to write to
#   - Where uploaded images are stored (img/)
#   - The full editor UI for all portfolio content
# ──────────────────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME      # e.g. quentindavis/portfolio
  branch: main
  auth_type: pkce
  app_id: YOUR_OAUTH_CLIENT_ID                   # from your GitHub OAuth App

# Where uploaded images and files are saved in the repo
media_folder: "img"
public_folder: "img"

# ── Collections ────────────────────────────────────────────────────────────────
# A "files" collection manages specific known files rather than a folder of posts.
# Here we point directly at data/portfolio.json so every field in that file
# becomes an editable field in the CMS dashboard.

collections:
  - name: portfolio
    label: "Portfolio"
    files:

      # ── Profile & About ──────────────────────────────────────────────────────
      - name: profile
        label: "Profile & About"
        file: "data/portfolio.json"
        format: json
        fields:
          - label: "Profile"
            name: profile
            widget: object
            fields:
              - { label: "Full Name",  name: name,    widget: string }
              - label: "Roles"
                name: roles
                widget: list
                field: { label: "Role", name: role, widget: string }
              - { label: "Tagline",    name: tagline, widget: string }
              - label: "About Paragraphs"
                name: about
                widget: list
                field: { label: "Paragraph", name: paragraph, widget: text }

          # ── Contact ───────────────────────────────────────────────────────────
          - label: "Contact"
            name: contact
            widget: object
            fields:
              - { label: "Email",        name: email,       widget: string }
              - { label: "Phone",        name: phone,       widget: string }
              - { label: "Location",     name: location,    widget: string }
              - { label: "Availability", name: availability, widget: string }
              - { label: "GitHub URL",   name: githubUrl,   widget: string }
              - { label: "LinkedIn URL", name: linkedinUrl, widget: string }
              - { label: "Discord (username or invite link)", name: discord, widget: string, required: false }
              - { label: "Itch.io URL",  name: itchUrl,     widget: string, required: false }

          # ── Projects ──────────────────────────────────────────────────────────
          - label: "Projects"
            name: projects
            widget: list
            fields:
              - { label: "Name",        name: name,      widget: string }
              - { label: "Your Role",   name: role,      widget: string }
              - { label: "Timeframe",   name: timeframe, widget: string }
              - { label: "Engine / Tech Stack", name: engine, widget: string }
              - { label: "Featured Project?", name: featured, widget: boolean, default: false }
              - { label: "Sort Order (lower = first)", name: sortOrder, widget: number, default: 99 }
              - label: "Tags"
                name: tags
                widget: list
                field: { label: "Tag", name: tag, widget: string }
              - { label: "Cover Image",    name: image,    widget: image, required: false }
              - { label: "Image Alt Text", name: imageAlt, widget: string, required: false }
              - label: "Gallery Images (additional screenshots)"
                name: galleryImages
                widget: list
                required: false
                field: { label: "Image", name: src, widget: image }
              - { label: "Embed URL (playable)",  name: embed,    widget: string, required: false }
              - { label: "Video URL (YouTube/Vimeo)", name: videoUrl, widget: string, required: false }
              - { label: "Short Summary", name: summary, widget: text }
              - { label: "Full Description", name: details, widget: text }
              - label: "Highlights (bullet points)"
                name: highlights
                widget: list
                field: { label: "Highlight", name: point, widget: string }
              - label: "Links"
                name: links
                widget: list
                required: false
                fields:
                  - { label: "Button Label", name: label, widget: string }
                  - { label: "URL",          name: url,   widget: string }

          # ── Skills ────────────────────────────────────────────────────────────
          - label: "Skills"
            name: skills
            widget: list
            fields:
              - { label: "Category Name", name: category, widget: string }
              - label: "Skills in this Category"
                name: items
                widget: list
                fields:
                  - { label: "Skill Name", name: name,      widget: string }
                  - { label: "Proficiency % (0–100)", name: percent, widget: number, min: 0, max: 100 }
                  - label: "Level Label"
                    name: level
                    widget: select
                    required: false
                    options:
                      - { label: "Beginner",     value: Beginner }
                      - { label: "Intermediate", value: Intermediate }
                      - { label: "Advanced",     value: Advanced }
                      - { label: "Expert",       value: Expert }
                  - { label: "Sort Order", name: sortOrder, widget: number, default: 99, required: false }

          # ── Artwork ───────────────────────────────────────────────────────────
          - label: "Artwork"
            name: art
            widget: list
            fields:
              - { label: "Title",       name: title,    widget: string }
              - { label: "Image",       name: src,      widget: image }
              - { label: "Alt Text",    name: alt,      widget: string }
              - { label: "Category",    name: category, widget: string }
              - { label: "Year",        name: year,     widget: string }
              - { label: "Description", name: description, widget: text, required: false }
              - { label: "Related Project (name)", name: relatedProject, widget: string, required: false }
              - { label: "Sort Order",  name: sortOrder, widget: number, default: 99, required: false }

          # ── Music ─────────────────────────────────────────────────────────────
          - label: "Background Music Playlist"
            name: music
            widget: list
            fields:
              - { label: "Track Name", name: name, widget: string }
              - { label: "Audio File", name: src,  widget: file }
